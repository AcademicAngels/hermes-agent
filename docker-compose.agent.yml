# Agent-first Docker Compose stack for Hermes Agent.
#
# This file intentionally does not replace the upstream docker-compose.yml.
# Use it for local personal deployments that should run Hermes from the
# hermes-agent repository without the separate hermes-web-ui stack.
#
# Quick start:
#   cp .env.agent.example .env.agent
#   install -d -m 700 /home/hermes_data
#   docker compose --env-file .env.agent -f docker-compose.agent.yml \
#     pull hindsight hindsight-postgres
#   docker compose --env-file .env.agent -f docker-compose.agent.yml \
#     build hermes-cron-memory-ingestor
#   docker compose --env-file .env.agent -f docker-compose.agent.yml up -d --remove-orphans
#
# Native Hermes CLI:
#   scripts/setup-native-agent.sh
#   hermes
#
services:
  hindsight-postgres:
    image: ${HINDSIGHT_DB_IMAGE:-timescale/timescaledb-ha:pg18-all-oss}
    container_name: ${HINDSIGHT_DB_CONTAINER_NAME:-hindsight-postgres}
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${HINDSIGHT_DB_USER:-hindsight_user}
      POSTGRES_PASSWORD: ${HINDSIGHT_DB_PASSWORD:-hindsight_pass}
      POSTGRES_DB: ${HINDSIGHT_DB_NAME:-hindsight_db}
    volumes:
      - ${HERMES_DATA_DIR:-/home/hermes_data}/hindsight-postgres:/var/lib/postgresql
    networks:
      - hermes-agent-net

  hindsight:
    image: ghcr.io/vectorize-io/hindsight:${HINDSIGHT_VERSION:-latest}
    container_name: ${HINDSIGHT_CONTAINER_NAME:-hindsight-app}
    restart: unless-stopped
    ports:
      - "${HINDSIGHT_PORT:-18888}:8888"
      - "${HINDSIGHT_UI_PORT:-19999}:9999"
    environment:
      HINDSIGHT_API_DATABASE_URL: postgresql://${HINDSIGHT_DB_USER:-hindsight_user}:${HINDSIGHT_DB_PASSWORD:-hindsight_pass}@hindsight-postgres:5432/${HINDSIGHT_DB_NAME:-hindsight_db}
      HINDSIGHT_API_LLM_API_KEY: ${HINDSIGHT_LLM_API_KEY:-}
      HINDSIGHT_API_LLM_BASE_URL: ${HINDSIGHT_LLM_BASE_URL:-}
      HINDSIGHT_API_LLM_MODEL: ${HINDSIGHT_LLM_MODEL:-}
      HINDSIGHT_API_VECTOR_EXTENSION: ${HINDSIGHT_VECTOR_EXTENSION:-pgvectorscale}
      HINDSIGHT_API_EMBEDDINGS_PROVIDER: ${HINDSIGHT_EMBEDDINGS_PROVIDER:-openai}
      HINDSIGHT_API_EMBEDDINGS_OPENAI_BASE_URL: ${HINDSIGHT_EMBEDDINGS_OPENAI_BASE_URL:-}
      HINDSIGHT_API_EMBEDDINGS_OPENAI_API_KEY: ${HINDSIGHT_EMBEDDINGS_OPENAI_API_KEY:-}
      HINDSIGHT_API_EMBEDDINGS_OPENAI_MODEL: ${HINDSIGHT_EMBEDDINGS_OPENAI_MODEL:-}
    depends_on:
      - hindsight-postgres
    networks:
      - hermes-agent-net

  hermes-cron-memory-ingestor:
    build:
      context: ${CRON_MEMORY_INGESTOR_CONTEXT:-../hermes-cron-memory-ingestor}
      dockerfile: Dockerfile
    image: ${CRON_MEMORY_INGESTOR_IMAGE:-hermes-cron-memory-ingestor:local}
    container_name: ${CRON_MEMORY_INGESTOR_CONTAINER_NAME:-hermes-cron-memory-ingestor}
    restart: unless-stopped
    volumes:
      - ${HERMES_DATA_DIR:-/home/hermes_data}:/home/agent/.hermes
    environment:
      HERMES_HOME: /home/agent/.hermes
      CRON_OUTPUT_DIR: /home/agent/.hermes/cron/output
      HINDSIGHT_URL: ${HINDSIGHT_URL:-http://hindsight:8888}
      HINDSIGHT_BANK_ID: ${HINDSIGHT_BANK_ID:-hermes}
      INGEST_INTERVAL_SECONDS: ${CRON_MEMORY_INGEST_INTERVAL_SECONDS:-60}
      INGESTOR_EVENT_HOST: 0.0.0.0
      INGESTOR_EVENT_PORT: ${CRON_MEMORY_EVENT_PORT:-8787}
      INGESTOR_EXCLUDED_SESSION_IDS: ${CRON_MEMORY_EXCLUDED_SESSION_IDS:-}
      INGESTOR_TAGS: ${CRON_MEMORY_TAGS:-hermes,cron}
    expose:
      - "${CRON_MEMORY_EVENT_PORT:-8787}"
    ports:
      - "${CRON_MEMORY_EVENT_PUBLIC_HOST:-127.0.0.1}:${CRON_MEMORY_EVENT_PUBLIC_PORT:-18787}:${CRON_MEMORY_EVENT_PORT:-8787}"
    depends_on:
      hindsight:
        condition: service_started
    networks:
      - hermes-agent-net

networks:
  hermes-agent-net:
    driver: bridge
